<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>


    <link href="../css/style.css" type="text/css" rel="stylesheet" />
    <link href="../css/mystyle.css" type="text/css" rel="stylesheet" />
    <link href="../css/Bootstrap.css" type="text/css" rel="stylesheet" />
    <link href="../css/BlueTabs.css" type="text/css" rel="stylesheet" />
    <script src="../js/jquery-1.js" type="text/javascript"></script>
    <script src="../js/script.jsx" type="text/javascript"></script>
    <script type="text/javascript" src="/js/ms.js"></script>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script src="../js/bootstrap.js"></script>
    <script src="../js/bootstrap-alert.js"></script>

</head>
<body>

    <div class="center-box ">

        <div><img src="../Images/logo.png"></div>
        <br />

        A Prime Special Jewel Loan opening request is initiated by {branch}.
        OTP for this approval is <h3>{otp}</h3>
        <div class="msgbox ">
            <span class="caption "><strong>Loan Info</strong> </span>

        </div>

        <table class="customers ">
            <tr>
                <td style="border:none"><p style="font-size:smaller;font-variant-caps:all-small-caps;margin-top:10px;width:140px">date&Time</p></td>
                <td style="border:none">
                    {lbldt}
                </td>


                <td style="border:none"><p style="font-size:smaller;font-variant-caps:all-small-caps;margin-top:10px;width:140px">Entered By</p></td>
                <td style="border:none">
                    {lblentryby}
                </td>


            </tr>
            <tr>

                <td style="border:none"><p style="font-size:smaller;font-variant-caps:all-small-caps;margin-top:10px;width:140px">Account No</p></td>
                <td style="border:none">
                    {lblacn}
                </td>

                <td style="border:none"><p style="font-size:smaller;font-variant-caps:all-small-caps;margin-top:10px;width:140px">Customer Name</p></td>
                <td style="border:none">
                    {lblname}
                </td>




            </tr>

            <tr>
                <td style="border:none"><p style="font-size:smaller;font-variant-caps:all-small-caps;margin-top:10px;width:140px">Amount</p></td>
                <td style="border:none">
                    {lblamt}
                </td>
            </tr>


        </table>
    </div>
</body>
</html>
