<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>

    <div class="center-box ">

        <div><img src="../Images/logo.png"></div>
        <br />

        A Correction Request initiated by {branch}.
        OTP for this correction is <h3>{otp}</h3>

        <div class="container " style="float:left;margin-top:20px">

            <table class="table_box  " style="margin-left:30px">
                <tbody>
                    <tr style="height:60px">
                        <td style="border:none;width:200px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Date</label></td>
                        <td style="border:none">{dt}</td>
                    </tr>
                    <tr>
                        <td style="border:none;width:150px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Rate Per GM</label></td>
                        <td style="border:none">{rpg}</td>
                    </tr>
                    <tr>
                        <td style="border:none;width:150px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Plus Rate</label></td>
                        <td style="border:none">{prpg}</td>
                    </tr>
                    <tr>
                        <td style="border:none;width:150px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Ultra Rate</label></td>
                        <td style="border:none">{urpg}</td>
                    </tr>
                    <tr style="height:60px">
                        <td style="border:none;width:90px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Loan Limit in %</label></td>
                        <td style="border:none">{lonlimit}</td>
                    </tr>
                    <tr style="height:60px">
                        <td style="border:none;width:90px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Prime Plus Limit</label></td>
                        <td style="border:none">{pplimit}</td>
                    </tr>
                    <tr style="height:60px">
                        <td style="border:none;width:90px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Prime Plus w RD</label></td>
                        <td style="border:none">{pplwrd}</td>
                    </tr>


                </tbody>
            </table>
        </div>

        </div> 
</body>
</html>
