<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>

    <div class="center-box ">

        <div><img src="../Images/logo.png"></div>
        <br />

        Rate of Interest Change initiated by {branch}.
        OTP for this Change is <h3>{otp}</h3>

        <div class="container " style="float:left;margin-top:20px">

            <table class="table_box  " style="margin-left:30px">
                <tbody>
                    <tr style="height:60px">
                        <td style="border:none;width:200px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Date</label></td>
                        <td style="border:none">{dt}</td>
                    </tr>
                    <tr>
                        <td style="border:none;width:150px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Member No</label></td>
                        <td style="border:none">{cid}</td>
                    </tr>
                    <tr>
                        <td style="border:none;width:150px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Member Name</label></td>
                        <td style="border:none">{name}</td>
                    </tr>
                    <tr>
                        <td style="border:none;width:150px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Address</label></td>
                        <td style="border:none">{address}</td>
                    </tr>
                    <tr style="height:60px">
                        <td style="border:none;width:90px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Product</label></td>
                        <td style="border:none">{prod}</td>
                    </tr>
                    <tr style="height:60px">
                        <td style="border:none;width:90px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Period</label></td>
                        <td style="border:none">{prd}</td>
                    </tr>
                    <tr style="height:60px">
                        <td style="border:none;width:90px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">Renewal</label></td>
                        <td style="border:none">{isren}</td>
                    </tr>

                    <tr style="height:60px">
                        <td style="border:none;width:90px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">C-Int</label></td>
                        <td style="border:none">{cint}</td>
                    </tr>
                    <tr style="height:60px">
                        <td style="border:none;width:90px"><label style="margin-left:30px;font-size:small;font-variant-caps:small-caps;display:inline-block;float:left;margin-top:3px ">D-Int</label></td>
                        <td style="border:none">{dint}</td>
                    </tr>


                </tbody>
            </table>
        </div>

    </div>
</body>
</html>
